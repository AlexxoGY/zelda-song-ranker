<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelda Song Ranker</title>
    <!-- Cargamos Tailwind para los estilos rápidos y bonitos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cargamos FontAwesome para los íconos (Botón de Play, Espadas, etc) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sheikah: {
                            dark: '#1c1c1e',
                            slate: '#2d3035',
                            blue: '#42f5f5',
                            gold: '#e6c86e'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            background-color: #121212;
            color: white;
            /* Patrón de fondo sutil estilo piedra/tecnología antigua */
            background-image: radial-gradient(#2d3035 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(66, 245, 245, 0.4);
            border-color: #42f5f5;
        }

        .btn-sheikah {
            transition: all 0.2s ease;
        }
        
        .btn-sheikah:hover {
            box-shadow: 0 0 15px rgba(230, 200, 110, 0.5);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <header class="bg-sheikah-dark border-b-2 border-sheikah-gold p-4 shadow-lg text-center relative">
        <h1 class="text-3xl font-extrabold text-sheikah-gold tracking-widest uppercase">
            <i class="fa-solid fa-triforce text-yellow-500 mr-2"></i> Zelda Song Ranker
        </h1>
        <p class="text-gray-400 text-sm mt-1">Descubre tu top definitivo de la saga</p>
        
        <!-- Simulador de progreso de votación -->
        <div class="absolute bottom-0 left-0 h-1 bg-sheikah-blue" style="width: 15%;"></div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4 sm:p-8">
        
        <div class="text-center mb-8">
            <h2 class="text-xl font-semibold text-sheikah-blue mb-2">¿Qué canción es mejor?</h2>
            <p class="text-sm text-gray-400">Escucha los avances y elige tu favorita.</p>
        </div>

        <!-- Contenedor de las dos opciones A y B -->
        <div class="flex flex-col md:flex-row gap-8 items-center w-full max-w-5xl">
            
            <!-- TARJETA A -->
            <div id="card-a" class="flex-1 bg-sheikah-slate rounded-xl border-2 border-gray-600 p-6 flex flex-col items-center cursor-pointer transition-all duration-300 card-hover w-full md:w-1/2" onclick="votar('A')">
                <div class="relative w-full aspect-video rounded-lg overflow-hidden mb-4 group">
                    <img id="img-a" src="https://placehold.co/600x400/1c1c1e/e6c86e?text=Zelda+OoT" alt="Portada A" class="w-full h-full object-cover">
                    <!-- Botón Play superpuesto -->
                    <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <button class="w-16 h-16 bg-sheikah-blue rounded-full text-sheikah-dark flex items-center justify-center text-2xl hover:scale-110 transition-transform" onclick="event.stopPropagation(); alert('¡Aquí sonaría la canción A!');">
                            <i class="fa-solid fa-play ml-1"></i>
                        </button>
                    </div>
                </div>
                <h3 id="title-a" class="text-2xl font-bold text-white text-center mb-1">Cargando...</h3>
                <p id="game-a" class="text-sheikah-gold font-semibold text-sm uppercase tracking-wide">...</p>
                <span id="cat-a" class="mt-3 px-3 py-1 bg-gray-800 rounded-full text-xs text-gray-300">...</span>
            </div>

            <!-- Separador VS -->
            <div class="hidden md:flex flex-col items-center justify-center">
                <div class="w-12 h-12 bg-sheikah-dark border-2 border-sheikah-blue text-sheikah-blue rounded-full flex items-center justify-center font-bold text-xl shadow-[0_0_15px_rgba(66,245,245,0.5)]">
                    VS
                </div>
            </div>

            <!-- TARJETA B -->
            <div id="card-b" class="flex-1 bg-sheikah-slate rounded-xl border-2 border-gray-600 p-6 flex flex-col items-center cursor-pointer transition-all duration-300 card-hover w-full md:w-1/2" onclick="votar('B')">
                <div class="relative w-full aspect-video rounded-lg overflow-hidden mb-4 group">
                    <img id="img-b" src="https://placehold.co/600x400/1c1c1e/42f5f5?text=Zelda+WW" alt="Portada B" class="w-full h-full object-cover">
                    <!-- Botón Play superpuesto -->
                    <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <button class="w-16 h-16 bg-sheikah-blue rounded-full text-sheikah-dark flex items-center justify-center text-2xl hover:scale-110 transition-transform" onclick="event.stopPropagation(); alert('¡Aquí sonaría la canción B!');">
                            <i class="fa-solid fa-play ml-1"></i>
                        </button>
                    </div>
                </div>
                <h3 id="title-b" class="text-2xl font-bold text-white text-center mb-1">Cargando...</h3>
                <p id="game-b" class="text-sheikah-gold font-semibold text-sm uppercase tracking-wide">...</p>
                <span id="cat-b" class="mt-3 px-3 py-1 bg-gray-800 rounded-full text-xs text-gray-300">...</span>
            </div>
        </div>

        <div class="mt-10 flex gap-4">
            <button class="px-6 py-3 bg-gray-700 hover:bg-gray-600 text-white rounded-lg font-semibold transition-colors flex items-center gap-2" onclick="cargarNuevasCanciones()">
                <i class="fa-solid fa-forward-step"></i> Saltar / Empate
            </button>
            <button class="px-6 py-3 bg-transparent border-2 border-sheikah-gold text-sheikah-gold hover:bg-sheikah-gold hover:text-black rounded-lg font-semibold transition-colors flex items-center gap-2">
                <i class="fa-solid fa-rotate-left"></i> Deshacer
            </button>
        </div>
    </main>

    <footer class="text-center p-4 text-gray-500 text-xs">
        <p>Proyecto Fan. Las canciones e imágenes pertenecen a Nintendo.</p>
    </footer>

    <script>
        // Simulamos nuestra base de datos JSON directamente en el código para el prototipo
        const canciones = [
            { id: "oot-001", titulo: "Gerudo Valley", juego: "Ocarina of Time", categoria: "Overworld", color: "e6c86e" },
            { id: "tww-001", titulo: "Dragon Roost Island", juego: "The Wind Waker", categoria: "Isla / Pueblo", color: "42f5f5" },
            { id: "botw-001", titulo: "Main Theme", juego: "Breath of the Wild", categoria: "Tema Principal", color: "88ccff" },
            { id: "mm-001", titulo: "Song of Healing", juego: "Majora's Mask", categoria: "Evento / Historia", color: "cc66ff" },
            { id: "tp-001", titulo: "Midna's Lament", juego: "Twilight Princess", categoria: "Historia / Emocional", color: "ffaa00" },
            { id: "oot-002", titulo: "Zelda's Lullaby", juego: "Ocarina of Time", categoria: "Tema de Personaje", color: "e6c86e" },
            { id: "tp-002", titulo: "Hyrule Field", juego: "Twilight Princess", categoria: "Overworld", color: "ffaa00" }
        ];

        let cancionA_actual = null;
        let cancionB_actual = null;

        // Función para elegir 2 canciones distintas al azar
        function cargarNuevasCanciones() {
            // Clonamos la lista para no alterar la original
            let opciones = [...canciones];
            
            // Elegir Canción A al azar y quitarla de la lista de opciones
            let indiceA = Math.floor(Math.random() * opciones.length);
            cancionA_actual = opciones[indiceA];
            opciones.splice(indiceA, 1);
            
            // Elegir Canción B al azar de lo que queda
            let indiceB = Math.floor(Math.random() * opciones.length);
            cancionB_actual = opciones[indiceB];

            // Actualizar la pantalla
            actualizarPantalla();
        }

        function actualizarPantalla() {
            // Tarjeta A
            document.getElementById('title-a').innerText = cancionA_actual.titulo;
            document.getElementById('game-a').innerText = cancionA_actual.juego;
            document.getElementById('cat-a').innerText = cancionA_actual.categoria;
            // Generamos una imagen de relleno con colores que varian
            document.getElementById('img-a').src = `https://placehold.co/600x400/1c1c1e/${cancionA_actual.color}?text=${cancionA_actual.juego.replace(/\s/g, '+')}`;

            // Tarjeta B
            document.getElementById('title-b').innerText = cancionB_actual.titulo;
            document.getElementById('game-b').innerText = cancionB_actual.juego;
            document.getElementById('cat-b').innerText = cancionB_actual.categoria;
            document.getElementById('img-b').src = `https://placehold.co/600x400/1c1c1e/${cancionB_actual.color}?text=${cancionB_actual.juego.replace(/\s/g, '+')}`;
        }

        // Función que se ejecuta al hacer clic en una tarjeta
        function votar(opcion) {
            let ganadora = opcion === 'A' ? cancionA_actual.titulo : cancionB_actual.titulo;
            // Aquí en el futuro irá la lógica de puntos, por ahora solo mostramos un mensaje y cambiamos
            console.log(`Has votado por: ${ganadora}`);
            
            // Agregar un pequeño efecto visual al hacer clic
            let cardId = opcion === 'A' ? 'card-a' : 'card-b';
            let card = document.getElementById(cardId);
            card.classList.add('scale-95', 'opacity-50');
            
            setTimeout(() => {
                card.classList.remove('scale-95', 'opacity-50');
                cargarNuevasCanciones();
            }, 300); // Esperar un tercio de segundo antes de cambiar
        }

        // Iniciar la página cargando la primera batalla
        window.onload = function() {
            cargarNuevasCanciones();
        };
    </script>
</body>
</html>
