<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelda Song Ranker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Fuente Lora para el texto general (estilo Hyrule Warriors) -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Fuente Hylia Serif Beta descargada */
        @font-face {
            font-family: 'ZeldaCustom';
            src: url('fuentes/HyliaSerifBeta-Regular.otf') format('opentype'); 
        }

        .fuente-zelda {
            font-family: 'ZeldaCustom', 'Lora', serif;
            font-weight: normal;
        }

        /* Aplicamos Lora a todo el texto normal y el fondo */
        body {
            font-family: 'Lora', serif;
            background-color: #0d1117;
            /* Usamos la imagen con fondo un poco más oscuro para que la letra blanca se lea bien */
            background-image: linear-gradient(rgba(13, 17, 23, 0.9), rgba(13, 17, 23, 0.9)), url('imagenes/Simbolos%20Zelda%201.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            min-height: 100vh;
        }
        
        .bg-sheikah-dark { background-color: rgba(13, 17, 23, 0.85); }
        .bg-sheikah-blue { background-color: #42f5f5; }
        .text-sheikah-blue { color: #42f5f5; }
        .border-sheikah { border: 1px solid rgba(66, 245, 245, 0.3); }
        
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(66, 245, 245, 0.3);
            border-color: rgba(66, 245, 245, 0.8);
        }
        
        /* Prioridad absoluta para ocultar los menús emergentes */
        .modal-hidden { display: none !important; }

        /* Estilos personalizados para la barra del reproductor de música */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
            width: 100%;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #e6c86e; /* Dorado estilo Zelda */
            margin-top: -4px;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(230, 200, 110, 0.8);
        }
        input[type=range]:focus { outline: none; }
    </style>
</head>
<body class="flex flex-col items-center">

    <header class="w-full bg-sheikah-dark border-b border-sheikah p-4 sticky top-0 z-10 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-music text-sheikah-blue text-2xl"></i>
                <h1 class="text-2xl md:text-3xl fuente-zelda tracking-wider text-white" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">
                    ZELDA <span class="text-sheikah-blue">SONG RANKER</span>
                </h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden md:block text-sm text-gray-400">
                    Votos: <span id="contador-votos" class="text-sheikah-blue font-bold">0</span>
                </div>
                <button onclick="abrirRanking()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded border border-gray-600 transition-colors flex items-center gap-2 font-bold shadow-md">
                    <i class="fa-solid fa-trophy text-yellow-500"></i>
                    <span class="hidden md:inline">Ver Ranking</span>
                </button>
            </div>
        </div>
    </header>

    <main class="w-full max-w-5xl mx-auto flex-grow flex flex-col justify-center p-4 md:p-8 mb-24">
        
        <div class="text-center mb-8">
            <h2 class="text-gray-300 text-lg">¿Qué canción es mejor?</h2>
            <div class="md:hidden text-sm text-gray-400 mt-2">
                Votos: <span id="contador-votos-mobile" class="text-sheikah-blue font-bold">0</span>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-6 md:gap-12 items-center justify-center w-full">
            
            <!-- Contenedor A (Canción 1) -->
            <div class="w-full md:w-5/12 flex flex-col gap-4 items-center">
                <!-- Tarjeta visual (Ya NO se puede hacer clic para votar) -->
                <div class="w-full bg-sheikah-dark border-sheikah rounded-xl p-4 md:p-6 card-hover flex flex-col" style="background-color: #2a9d8f;">
                    <div class="relative w-4/5 mx-auto aspect-square rounded-lg overflow-hidden mb-6 group shadow-2xl border-2 border-white border-opacity-20">
                        <img id="img-a" src="" alt="Portada A" class="w-full h-full object-cover">
                        <!-- Botón Play superpuesto -->
                        <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <button class="w-16 h-16 bg-sheikah-blue rounded-full text-sheikah-dark flex items-center justify-center text-2xl hover:scale-110 transition-transform shadow-[0_0_15px_rgba(66,245,245,0.6)] cursor-pointer" onclick="togglePlay('A');">
                                <i id="icon-play-a" class="fa-solid fa-play ml-1"></i>
                            </button>
                        </div>
                    </div>
                    <h3 id="title-a" class="text-3xl fuente-zelda text-white text-center mb-2" style="text-shadow: 2px 2px 6px rgba(0,0,0,0.9);">Cargando...</h3>
                    <p id="game-a" class="text-white text-center text-sm font-bold mb-3 opacity-90">Cargando...</p>
                    <div class="mt-auto flex justify-center">
                        <span id="cat-a" class="bg-black bg-opacity-40 text-xs px-3 py-1 rounded-full text-white border border-white border-opacity-20">...</span>
                    </div>
                </div>

                <!-- Botón de Voto A -->
                <button onclick="votar('A')" class="w-full max-w-sm bg-gray-900 hover:bg-sheikah-dark text-white py-3 px-4 rounded-xl border border-sheikah transition-all hover:scale-105 shadow-[0_0_15px_rgba(66,245,245,0.2)] hover:shadow-[0_0_20px_rgba(66,245,245,0.6)] flex items-center justify-center gap-2 group cursor-pointer">
                    <i class="fa-solid fa-check text-gray-500 group-hover:text-sheikah-blue transition-colors"></i>
                    <span>Prefiero: <span id="btn-text-a" class="font-bold text-sheikah-blue tracking-wide truncate inline-block max-w-[200px] align-bottom">Canción A</span></span>
                </button>
            </div>

            <!-- VS Badge -->
            <div class="flex-shrink-0 bg-gray-900 border-2 border-sheikah rounded-full w-16 h-16 flex items-center justify-center fuente-zelda text-3xl text-sheikah-blue z-10 -my-4 md:my-0 md:-mx-8 shadow-[0_0_20px_rgba(66,245,245,0.5)]">
                VS
            </div>

            <!-- Contenedor B (Canción 2) -->
            <div class="w-full md:w-5/12 flex flex-col gap-4 items-center">
                <!-- Tarjeta visual (Ya NO se puede hacer clic para votar) -->
                <div class="w-full bg-sheikah-dark border-sheikah rounded-xl p-4 md:p-6 card-hover flex flex-col" style="background-color: #e07a5f;">
                    <div class="relative w-4/5 mx-auto aspect-square rounded-lg overflow-hidden mb-6 group shadow-2xl border-2 border-white border-opacity-20">
                        <img id="img-b" src="" alt="Portada B" class="w-full h-full object-cover">
                        <!-- Botón Play superpuesto -->
                        <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <button class="w-16 h-16 bg-sheikah-blue rounded-full text-sheikah-dark flex items-center justify-center text-2xl hover:scale-110 transition-transform shadow-[0_0_15px_rgba(66,245,245,0.6)] cursor-pointer" onclick="togglePlay('B');">
                                <i id="icon-play-b" class="fa-solid fa-play ml-1"></i>
                            </button>
                        </div>
                    </div>
                    <h3 id="title-b" class="text-3xl fuente-zelda text-white text-center mb-2" style="text-shadow: 2px 2px 6px rgba(0,0,0,0.9);">Cargando...</h3>
                    <p id="game-b" class="text-white text-center text-sm font-bold mb-3 opacity-90">Cargando...</p>
                    <div class="mt-auto flex justify-center">
                        <span id="cat-b" class="bg-black bg-opacity-40 text-xs px-3 py-1 rounded-full text-white border border-white border-opacity-20">...</span>
                    </div>
                </div>

                <!-- Botón de Voto B -->
                <button onclick="votar('B')" class="w-full max-w-sm bg-gray-900 hover:bg-sheikah-dark text-white py-3 px-4 rounded-xl border border-sheikah transition-all hover:scale-105 shadow-[0_0_15px_rgba(66,245,245,0.2)] hover:shadow-[0_0_20px_rgba(66,245,245,0.6)] flex items-center justify-center gap-2 group cursor-pointer">
                    <i class="fa-solid fa-check text-gray-500 group-hover:text-sheikah-blue transition-colors"></i>
                    <span>Prefiero: <span id="btn-text-b" class="font-bold text-sheikah-blue tracking-wide truncate inline-block max-w-[200px] align-bottom">Canción B</span></span>
                </button>
            </div>

        </div>

        <!-- Botón Saltar (Se mantiene al centro y abajo) -->
        <div class="mt-10 flex justify-center gap-4">
            <button onclick="cargarNuevasCanciones()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-6 py-3 rounded-full border border-gray-600 transition-colors text-sm flex items-center gap-2 shadow-lg">
                <i class="fa-solid fa-forward-step"></i> No conozco ambas / Saltar
            </button>
        </div>
    </main>

    <!-- Modal Ranking -->
    <div id="modal-ranking" class="modal-hidden fixed inset-0 bg-black bg-opacity-80 z-50 flex justify-center items-center p-4">
        <div class="bg-[#161b22] border border-sheikah rounded-xl w-full max-w-2xl max-h-[80vh] flex flex-col shadow-2xl">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-sheikah-dark rounded-t-xl">
                <h2 class="text-2xl fuente-zelda text-white flex items-center gap-2 tracking-wider"><i class="fa-solid fa-trophy text-yellow-500"></i> TU RANKING</h2>
                <button onclick="cerrarRanking()" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark text-2xl"></i>
                </button>
            </div>
            <div class="p-4 overflow-y-auto flex-grow" id="lista-ranking"></div>
            <div class="p-4 border-t border-gray-800 bg-sheikah-dark rounded-b-xl flex justify-between items-center">
                <p class="text-xs text-gray-500">Sistema de puntuación Elo.</p>
                <button onclick="confirmarReinicio()" class="bg-red-900 bg-opacity-50 hover:bg-opacity-100 text-red-200 px-3 py-1 rounded border border-red-800 transition-colors text-sm flex items-center gap-1">
                    <i class="fa-solid fa-trash"></i> Reiniciar Progreso
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Mensaje General (Errores) -->
    <div id="modal-mensaje" class="modal-hidden fixed inset-0 bg-black bg-opacity-80 z-[60] flex justify-center items-center p-4">
        <div class="bg-[#161b22] border border-sheikah rounded-xl w-full max-w-sm flex flex-col shadow-2xl">
            <div class="p-4 border-b border-gray-800 bg-sheikah-dark rounded-t-xl text-center">
                <h2 id="modal-mensaje-titulo" class="text-xl font-bold text-white"><i class="fa-solid fa-circle-info text-sheikah-blue"></i> Mensaje</h2>
            </div>
            <div class="p-6 text-center text-gray-300" id="modal-mensaje-texto"></div>
            <div class="p-4 border-t border-gray-800 bg-sheikah-dark rounded-b-xl flex justify-center">
                <button onclick="cerrarMensaje()" class="bg-sheikah-blue text-sheikah-dark font-bold px-6 py-2 rounded transition-colors hover:bg-white">
                    Aceptar
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Confirmación Borrado -->
    <div id="modal-confirmacion" class="modal-hidden fixed inset-0 bg-black bg-opacity-80 z-[60] flex justify-center items-center p-4">
        <div class="bg-[#161b22] border border-red-900 rounded-xl w-full max-w-sm flex flex-col shadow-2xl">
            <div class="p-4 border-b border-gray-800 bg-red-900 bg-opacity-20 rounded-t-xl text-center">
                <h2 class="text-xl font-bold text-red-400"><i class="fa-solid fa-triangle-exclamation"></i> Advertencia</h2>
            </div>
            <div class="p-6 text-center text-gray-300">
                ¿Estás seguro de que quieres borrar todo tu progreso y volver a empezar?
            </div>
            <div class="p-4 border-t border-gray-800 bg-sheikah-dark rounded-b-xl flex justify-center gap-4">
                <button onclick="cerrarConfirmacion()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded transition-colors">
                    Cancelar
                </button>
                <button onclick="ejecutarReinicio()" class="bg-red-800 hover:bg-red-700 text-white px-4 py-2 rounded transition-colors">
                    Sí, borrar
                </button>
            </div>
        </div>
    </div>

    <div id="reproductor-barra" class="hidden fixed bottom-0 left-0 w-full bg-[#111] border-t-2 border-sheikah p-3 z-40 shadow-[0_-5px_15px_rgba(0,0,0,0.8)]">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-4">
            
            <button onclick="cerrarReproductor()" class="text-gray-400 hover:text-red-400 transition-colors p-2 border border-gray-700 rounded bg-gray-900 flex-shrink-0">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>

            <div class="w-full md:w-1/4 text-center md:text-left flex-shrink-0">
                <div id="barra-titulo" class="text-white font-bold truncate text-sm md:text-base fuente-zelda tracking-wider">Nombre de la canción</div>
                <div id="barra-juego" class="text-sheikah-blue text-xs truncate uppercase tracking-widest font-bold">Juego</div>
            </div>

            <div class="w-full flex-grow flex items-center gap-3">
                <!-- Nuevo botón de Play/Pausa central (Sirve para móviles y PC) -->
                <button onclick="togglePlayBarra()" class="text-white hover:text-sheikah-blue transition-transform hover:scale-110 text-xl ml-2">
                    <i id="icono-barra-play" class="fa-solid fa-pause"></i>
                </button>
                
                <span id="tiempo-actual" class="text-xs text-gray-400 font-mono w-10 text-right">0:00</span>
                <input type="range" id="barra-progreso" min="0" max="100" value="0" class="flex-grow" oninput="cambiarProgreso()">
                <span id="tiempo-total" class="text-xs text-gray-400 font-mono w-10">0:00</span>
            </div>

            <!-- Control de Volumen (Oculto en celulares porque el celular controla su propio volumen) -->
            <div class="hidden md:flex items-center gap-2 w-32 flex-shrink-0">
                <i class="fa-solid fa-volume-low text-gray-400 text-xs"></i>
                <input type="range" id="barra-volumen" min="0" max="1" step="0.05" value="1" oninput="cambiarVolumen()">
                <i class="fa-solid fa-volume-high text-gray-400 text-xs"></i>
            </div>
        </div>
    </div>

    <script>
        // BASE DE DATOS ACTUALIZADA CON LAS NUEVAS 8 CANCIONES (SIN APÓSTROFE)
        const baseDatosPorDefecto = [
            { id: "st-001", titulo: "File Select", juego: "Spirit Tracks", categoria: "Menú", color: "2a9d8f", elo: 1500, partidas: 0, archivo_audio: "canciones/st_file_select.mp3", portada: "portadas/st.png" },
            { id: "st-002", titulo: "Hyrule Castle", juego: "Spirit Tracks", categoria: "Castillo", color: "2a9d8f", elo: 1500, partidas: 0, archivo_audio: "canciones/st_hyrule_castle.mp3", portada: "portadas/st.png" },
            { id: "tp-001", titulo: "Hyrule Field", juego: "Twilight Princess", categoria: "Overworld", color: "e07a5f", elo: 1500, partidas: 0, archivo_audio: "canciones/tp_hyrule_field_orchestra.mp3", portada: "portadas/tp.jpg" },
            
            // CANCIONES RECIÉN AGREGADAS
            { id: "botw-001", titulo: "Main Theme", juego: "Breath of the Wild", categoria: "Tema Principal", color: "42f5f5", elo: 1500, partidas: 0, archivo_audio: "canciones/botw_main_theme.mp3", portada: "portadas/botw.jpg" },
            { id: "oot-001", titulo: "Fairy's Fountain", juego: "Ocarina of Time", categoria: "Fuente Hada", color: "4caf50", elo: 1500, partidas: 0, archivo_audio: "canciones/oot_fairys_fountain.mp3", portada: "portadas/oot.jpg" }, // <- Apóstrofe corregido
            { id: "oot-002", titulo: "Hyrule Field", juego: "Ocarina of Time", categoria: "Overworld", color: "4caf50", elo: 1500, partidas: 0, archivo_audio: "canciones/oot_hyrule_field.mp3", portada: "portadas/oot.jpg" },
            { id: "oot-003", titulo: "Shop Theme", juego: "Ocarina of Time", categoria: "Tienda", color: "4caf50", elo: 1500, partidas: 0, archivo_audio: "canciones/oot_shop.mp3", portada: "portadas/oot.jpg" },
            { id: "oot-004", titulo: "Title Theme", juego: "Ocarina of Time", categoria: "Menú", color: "4caf50", elo: 1500, partidas: 0, archivo_audio: "canciones/oot_title_theme.mp3", portada: "portadas/oot.jpg" }
        ];

        // Memoria actualizada a _v4 para limpiar la caché automáticamente y evitar errores
        let canciones = JSON.parse(localStorage.getItem('zeldaRankingData_v4')) || baseDatosPorDefecto;
        
        canciones = canciones.map(c => {
            let original = baseDatosPorDefecto.find(b => b.id === c.id);
            if(original) {
                c.archivo_audio = original.archivo_audio;
                c.portada = original.portada; 
            }
            return c;
        });

        let totalVotos = parseInt(localStorage.getItem('zeldaRankingVotos_v4')) || 0;
        let cancionA_actual = null;
        let cancionB_actual = null;

        let reproductorActual = new Audio();
        let cancionSonando = null;
        
        const barraReproductor = document.getElementById('reproductor-barra');
        const barraProgreso = document.getElementById('barra-progreso');
        const barraVolumen = document.getElementById('barra-volumen');
        const textoTiempoActual = document.getElementById('tiempo-actual');
        const textoTiempoTotal = document.getElementById('tiempo-total');
        const textoBarraTitulo = document.getElementById('barra-titulo');
        const textoBarraJuego = document.getElementById('barra-juego');
        
        
        // Evento: Cuando la música REPRODUCE, cambiamos TODOS los botones a 'Pausa' automáticamente
        reproductorActual.addEventListener('play', () => {
            document.getElementById('icono-barra-play').className = "fa-solid fa-pause";
            let iconoA = document.getElementById('icon-play-a');
            let iconoB = document.getElementById('icon-play-b');
            
            if(cancionSonando === 'A') {
                iconoA.className = "fa-solid fa-pause";
                iconoB.className = "fa-solid fa-play ml-1";
            } else if (cancionSonando === 'B') {
                iconoB.className = "fa-solid fa-pause";
                iconoA.className = "fa-solid fa-play ml-1";
            }
        });

        // Evento: Cuando la música se PAUSA, cambiamos TODOS los botones a 'Play' automáticamente
        reproductorActual.addEventListener('pause', () => {
            document.getElementById('icono-barra-play').className = "fa-solid fa-play ml-1";
            document.getElementById('icon-play-a').className = "fa-solid fa-play ml-1";
            document.getElementById('icon-play-b').className = "fa-solid fa-play ml-1";
        });

        function formatoTiempo(segundos) {
            if (isNaN(segundos)) return "0:00";
            const min = Math.floor(segundos / 60);
            const seg = Math.floor(segundos % 60);
            return min + ":" + (seg < 10 ? "0" : "") + seg;
        }

        reproductorActual.addEventListener('timeupdate', () => {
            if (reproductorActual.duration) {
                const porcentaje = (reproductorActual.currentTime / reproductorActual.duration) * 100;
                barraProgreso.value = porcentaje;
                textoTiempoActual.innerText = formatoTiempo(reproductorActual.currentTime);
            }
        });

        reproductorActual.addEventListener('loadedmetadata', () => {
            textoTiempoTotal.innerText = formatoTiempo(reproductorActual.duration);
        });

        function cambiarProgreso() {
            if (reproductorActual.duration) {
                const nuevoTiempo = (barraProgreso.value / 100) * reproductorActual.duration;
                reproductorActual.currentTime = nuevoTiempo;
            }
        }

        function cambiarVolumen() {
            reproductorActual.volume = barraVolumen.value;
        }

        function cerrarReproductor() {
            reproductorActual.pause();
            cancionSonando = null;
            barraReproductor.classList.add('hidden');
        }

        // Función del botón Play/Pausa de la barra inferior
        function togglePlayBarra() {
            if (!reproductorActual.paused) {
                reproductorActual.pause();
            } else {
                reproductorActual.play();
            }
        }

        // Función de los botones Play de las tarjetas
        function togglePlay(opcion) {
            let cancionElegida = opcion === 'A' ? cancionA_actual : cancionB_actual;
            
            // Si hace clic en la misma canción que está sonando o pausada
            if (cancionSonando === opcion) {
                if (!reproductorActual.paused) reproductorActual.pause();
                else reproductorActual.play();
                return;
            }

            // Si hace clic en una canción diferente
            reproductorActual.pause();

            if (cancionElegida.archivo_audio) {
                reproductorActual.src = cancionElegida.archivo_audio;
                
                barraReproductor.classList.remove('hidden');
                textoBarraTitulo.innerText = cancionElegida.titulo;
                textoBarraJuego.innerText = cancionElegida.juego;
                
                cancionSonando = opcion;
                
                reproductorActual.play().catch(e => {
                    mostrarMensaje("Error de Audio", "No se encontró el audio. ¿Seguro que subiste el archivo '" + cancionElegida.archivo_audio + "' a tu GitHub?");
                    barraReproductor.classList.add('hidden');
                });
            }
        }

        function guardarDatos() {
            localStorage.setItem('zeldaRankingData_v4', JSON.stringify(canciones));
            localStorage.setItem('zeldaRankingVotos_v4', totalVotos);
            actualizarContadores();
        }

        function actualizarContadores() {
            document.getElementById('contador-votos').innerText = totalVotos;
            document.getElementById('contador-votos-mobile').innerText = totalVotos;
        }

        function mostrarMensaje(titulo, texto) {
            document.getElementById('modal-mensaje-titulo').innerHTML = `<i class="fa-solid fa-circle-info text-sheikah-blue"></i> ${titulo}`;
            document.getElementById('modal-mensaje-texto').innerText = texto;
            document.getElementById('modal-mensaje').classList.remove('modal-hidden');
        }

        function cerrarMensaje() {
            document.getElementById('modal-mensaje').classList.add('modal-hidden');
        }

        function confirmarReinicio() {
            document.getElementById('modal-confirmacion').classList.remove('modal-hidden');
        }

        function cerrarConfirmacion() {
            document.getElementById('modal-confirmacion').classList.add('modal-hidden');
        }

        function ejecutarReinicio() {
            localStorage.removeItem('zeldaRankingData_v4');
            localStorage.removeItem('zeldaRankingVotos_v4');
            canciones = JSON.parse(JSON.stringify(baseDatosPorDefecto));
            totalVotos = 0;
            guardarDatos();
            cargarNuevasCanciones();
            cerrarRanking();
            cerrarConfirmacion();
            cerrarReproductor();
        }

        function cargarNuevasCanciones() {
            cerrarReproductor();

            let indiceA = Math.floor(Math.random() * canciones.length);
            let indiceB;
            do {
                indiceB = Math.floor(Math.random() * canciones.length);
            } while (indiceA === indiceB && canciones.length > 1);

            cancionA_actual = canciones[indiceA];
            cancionB_actual = canciones[indiceB];

            // Inyectar textos a la tarjeta A
            document.getElementById('title-a').innerText = cancionA_actual.titulo;
            document.getElementById('game-a').innerText = cancionA_actual.juego;
            document.getElementById('cat-a').innerText = cancionA_actual.categoria;
            document.getElementById('img-a').parentNode.parentNode.style.backgroundColor = '#' + cancionA_actual.color;
            document.getElementById('img-a').src = cancionA_actual.portada;
            document.getElementById('btn-text-a').innerText = cancionA_actual.titulo;

            // Inyectar textos a la tarjeta B
            document.getElementById('title-b').innerText = cancionB_actual.titulo;
            document.getElementById('game-b').innerText = cancionB_actual.juego;
            document.getElementById('cat-b').innerText = cancionB_actual.categoria;
            document.getElementById('img-b').parentNode.parentNode.style.backgroundColor = '#' + cancionB_actual.color;
            document.getElementById('img-b').src = cancionB_actual.portada;
            document.getElementById('btn-text-b').innerText = cancionB_actual.titulo;
        }

        function calcularElo(eloGanador, eloPerdedor) {
            const K = 32; 
            let probGanador = 1 / (1 + Math.pow(10, (eloPerdedor - eloGanador) / 400));
            let probPerdedor = 1 / (1 + Math.pow(10, (eloGanador - eloPerdedor) / 400));
            
            let nuevoEloGanador = Math.round(eloGanador + K * (1 - probGanador));
            let nuevoEloPerdedor = Math.round(eloPerdedor + K * (0 - probPerdedor));
            
            return { ganador: nuevoEloGanador, perdedor: nuevoEloPerdedor };
        }

        function votar(opcionGanadora) {
            let ganador = opcionGanadora === 'A' ? cancionA_actual : cancionB_actual;
            let perdedor = opcionGanadora === 'A' ? cancionB_actual : cancionA_actual;

            let nuevosElos = calcularElo(ganador.elo, perdedor.elo);
            
            let objGanador = canciones.find(c => c.id === ganador.id);
            let objPerdedor = canciones.find(c => c.id === perdedor.id);
            
            objGanador.elo = nuevosElos.ganador;
            objGanador.partidas += 1;
            
            objPerdedor.elo = nuevosElos.perdedor;
            objPerdedor.partidas += 1;

            totalVotos++;
            guardarDatos();
            cargarNuevasCanciones();
        }

        function abrirRanking() {
            let listaDiv = document.getElementById('lista-ranking');
            listaDiv.innerHTML = ''; 

            let cancionesOrdenadas = [...canciones].sort((a, b) => b.elo - a.elo);

            cancionesOrdenadas.forEach((cancion, index) => {
                let row = document.createElement('div');
                row.className = "flex items-center gap-4 p-3 border-b border-gray-800 hover:bg-gray-800 transition-colors";
                
                let rankVisual = `<span class="text-gray-500 font-bold w-6 text-center">${index + 1}</span>`;
                if(index === 0) rankVisual = `<i class="fa-solid fa-medal text-yellow-400 w-6 text-center text-xl"></i>`;
                if(index === 1) rankVisual = `<i class="fa-solid fa-medal text-gray-300 w-6 text-center text-xl"></i>`;
                if(index === 2) rankVisual = `<i class="fa-solid fa-medal text-amber-700 w-6 text-center text-xl"></i>`;

                row.innerHTML = `
                    ${rankVisual}
                    <div class="flex-grow">
                        <div class="text-white font-bold fuente-zelda tracking-wider" style="font-size: 1.1rem;">${cancion.titulo}</div>
                        <div class="text-sheikah-blue text-xs uppercase tracking-widest font-bold">${cancion.juego}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm font-mono text-gray-300">${cancion.elo} pts</div>
                        <div class="text-[10px] text-gray-500">${cancion.partidas} duelos</div>
                    </div>
                `;
                listaDiv.appendChild(row);
            });

            document.getElementById('modal-ranking').classList.remove('modal-hidden');
        }

        function cerrarRanking() {
            document.getElementById('modal-ranking').classList.add('modal-hidden');
        }

        actualizarContadores();
        cargarNuevasCanciones();
    </script>
</body>
</html>
